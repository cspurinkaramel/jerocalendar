<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JeroCalendar v2.0</title>
    <style>
        :root { --border: #ccc; --header-bg: #e0e0e0; --today: #fff9c4; --sat: #e3f2fd; --sun: #ffebee; }
        body { font-family: -apple-system, sans-serif; margin: 0; font-size: 9px; color: #111; overflow: hidden; background: #333; }
        
        /* ヘッダー周りのUI（さいすけ風ナビゲーション） */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #333; color: white; height: 35px; box-sizing: border-box;}
        .nav-btn { background: transparent; border: 1px solid #777; color: white; border-radius: 4px; padding: 4px 15px; cursor: pointer; font-size: 14px; }
        #month-display { font-size: 16px; font-weight: bold; }
        #auth-btn { cursor: pointer; padding: 4px 10px; background: #4285f4; color: white; border: none; border-radius: 4px; font-size: 10px; }
        
        /* 曜日ヘッダー */
        #weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--header-bg); border-bottom: 1px solid var(--border); }
        .wd { text-align: center; padding: 3px 0; border-right: 1px solid var(--border); font-weight: bold; font-size: 10px;}
        .wd:nth-child(1) { color: #d32f2f; } /* 日 */
        .wd:nth-child(7) { color: #1976d2; border-right: none; } /* 土 */

        /* カレンダー本体のグリッド */
        #calendar { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(calc((100vh - 60px) / 6), auto); width: 100vw; height: calc(100vh - 60px); background: white; }
        .day { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; padding-top: 14px; display: flex; flex-direction: column; gap: 1px; }
        
        /* 曜日ごとの背景色自動適用 */
        .day:nth-child(7n+1) { background: var(--sun); } /* 日曜列 */
        .day:nth-child(7n) { background: var(--sat); }   /* 土曜列 */
        .empty { background: #f0f0f0 !important; }
        
        .day-num { position: absolute; top: 0; left: 0; width: 100%; text-align: left; padding-left: 2px; font-weight: bold; font-size: 10px; background: rgba(255,255,255,0.7); z-index: 1; }
        .today { background: var(--today) !important; border: 1px solid #ffa000; box-sizing: border-box; }
        
        /* 予定・タスクの高密度ブロック */
        .event { background: #bbdefb; border-radius: 1px; padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid #1e88e5; z-index: 2; margin: 0 1px; }
        .task { background: #c8e6c9; border-radius: 1px; padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid #43a047; font-style: italic; z-index: 2; margin: 0 1px; }
    </style>
</head>
<body>
    <div id="top-bar">
        <button class="nav-btn" onclick="changeMonth(-1)">◀︎</button>
        <div id="month-display">表示中...</div>
        <button class="nav-btn" onclick="changeMonth(1)">▶︎</button>
        <button id="auth-btn" onclick="handleAuthClick()">接続</button>
    </div>
    <div id="weekdays">
        <div class="wd">日</div><div class="wd">月</div><div class="wd">火</div><div class="wd">水</div><div class="wd">木</div><div class="wd">金</div><div class="wd">土</div>
    </div>
    <div id="calendar"></div>

    <script>
        const CLIENT_ID = '538529257653-1rac4r8uedqq75pqmlrhrhlfnhkhgkn4.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks.readonly';
        let tokenClient, gapiInited = false, gisInited = false;
        
        // 状態変数：現在表示しているカレンダーの「年月」を保持
        let currentDisplayDate = new Date(); 
        currentDisplayDate.setDate(1); // 月またぎのバグを防ぐため1日に固定

        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest", "https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest"]});
            gapiInited = true;
            checkAutoLogin();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '', });
            gisInited = true;
        }

        function checkAutoLogin() {
            const savedToken = localStorage.getItem('jero_token');
            const savedTime = localStorage.getItem('jero_token_time');
            if (savedToken && savedTime && (Date.now() - savedTime < 3500000)) {
                document.getElementById('auth-btn').innerText = '同期中...';
                gapi.client.setToken({access_token: savedToken});
                loadCalendarData().catch(e => {
                    localStorage.removeItem('jero_token');
                    document.getElementById('auth-btn').innerText = '接続';
                    renderEmptyCalendar(); 
                });
            } else {
                renderEmptyCalendar(); // 未ログイン時は枠組みだけ描画
            }
        }

        async function handleAuthClick() {
            if (!gisInited || !gapiInited) { alert('準備中です。数秒お待ちください。'); return; }
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                gapi.client.setToken({access_token: resp.access_token});
                localStorage.setItem('jero_token', resp.access_token);
                localStorage.setItem('jero_token_time', Date.now());
                document.getElementById('auth-btn').innerText = '同期中...';
                await loadCalendarData();
            };
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        // 前月・翌月への移動処理
        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            if (localStorage.getItem('jero_token')) {
                document.getElementById('auth-btn').style.display = 'block';
                document.getElementById('auth-btn').innerText = '読込中...';
                loadCalendarData();
            } else {
                renderEmptyCalendar();
            }
        }

        async function loadCalendarData() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            document.getElementById('month-display').innerText = `${year}年 ${month + 1}月`;
            
            // 取得範囲を「表示している月」の1日〜末日に限定
            const startOfMonth = new Date(year, month, 1).toISOString();
            const endOfMonth = new Date(year, month + 1, 0, 23, 59, 59).toISOString();

            try {
                const [eventsResp, tasksResp] = await Promise.all([
                    gapi.client.calendar.events.list({ calendarId: 'primary', timeMin: startOfMonth, timeMax: endOfMonth, singleEvents: true, orderBy: 'startTime', maxResults: 500 }),
                    gapi.client.tasks.tasks.list({ tasklist: '@default', dueMin: startOfMonth, dueMax: endOfMonth })
                ]);
                renderCalendar(eventsResp.result.items || [], tasksResp.result.items || []);
                document.getElementById('auth-btn').style.display = 'none';
            } catch(e) {
                console.error(e);
                document.getElementById('auth-btn').innerText = '再接続';
            }
        }

        // データがない状態（外枠）だけを描画する関数
        function renderEmptyCalendar() {
            document.getElementById('month-display').innerText = `${currentDisplayDate.getFullYear()}年 ${currentDisplayDate.getMonth() + 1}月`;
            renderCalendar([], []);
        }

        function renderCalendar(events, tasks) {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayOfWeek = new Date(year, month, 1).getDay(); // 0:日曜日 〜 6:土曜日

            // 月初の「曜日ズレ」を調整する空白マス
            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'day empty';
                cal.appendChild(emptyEl);
            }

            const today = new Date();

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                
                let className = 'day';
                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    className += ' today';
                }
                dayEl.className = className;
                dayEl.innerHTML = `<div class="day-num">${i}</div>`;

                events.filter(e => (e.start.date || e.start.dateTime).includes(dateStr)).forEach(e => {
                    const div = document.createElement('div'); div.className = 'event'; div.innerText = e.summary; dayEl.appendChild(div);
                });
                tasks.filter(t => t.due && t.due.includes(dateStr)).forEach(t => {
                    const div = document.createElement('div'); div.className = 'task'; div.innerText = '√ ' + t.title; dayEl.appendChild(div);
                });
                cal.appendChild(dayEl);
            }
        }
    </script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
