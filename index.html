<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JeroCalendar v5.0 Singularity</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #111; --border: #e0e0e0; --header-bg: #f8f8f8; --today-bg: #fff9c4; --sat-bg: #f0f8ff; --sun-bg: #fff0f5; --event-fs: 9px; }
        [data-theme="dark"] { --bg-color: #000; --text-color: #fff; --border: #333; --header-bg: #1c1c1e; --today-bg: #333300; --sat-bg: #001f3f; --sun-bg: #3f0000; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); overflow: hidden; }

        /* ヘッダー周り */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; background: rgba(30,30,30,0.8); backdrop-filter: blur(10px); color: white; height: 40px; box-sizing: border-box; position: fixed; top: 0; width: 100%; z-index: 50; }
        #month-display { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .icon-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px; }
        #auth-btn { cursor: pointer; padding: 4px 10px; background: #0a84ff; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; }

        /* 曜日ヘッダー */
        #weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--header-bg); border-bottom: 1px solid var(--border); position: fixed; top: 40px; width: 100%; z-index: 40; height: 20px; align-items: center; }
        .wd { text-align: center; font-weight: bold; font-size: 10px; }

        /* カレンダー本体（無限スクロール領域） */
        #scroll-container { position: fixed; top: 60px; width: 100%; height: calc(100vh - 60px); overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .month-wrapper { position: relative; }
        .month-title { padding: 5px; font-size: 12px; font-weight: bold; background: var(--header-bg); border-bottom: 1px solid var(--border); text-align: center; color: #888; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(80px, auto); }
        
        /* 日付セル */
        .day { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; padding-top: 14px; display: flex; flex-direction: column; gap: 1px; cursor: pointer; }
        .day:active { background-color: rgba(128,128,128,0.2); }
        .day-num { position: absolute; top: 1px; left: 2px; font-weight: bold; font-size: 10px; z-index: 1; }
        .today .day-num { background: #ff3b30; color: white; border-radius: 50%; width: 14px; height: 14px; text-align: center; line-height: 14px; top: 0; left: 1px; }

        /* 予定ブロック */
        .event, .task { font-size: var(--event-fs); border-radius: 2px; padding: 1px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 2; margin: 0 1px; color: #fff; font-weight: 500; }
        .event { background: #0a84ff; }
        .task { background: #34c759; font-style: italic; }

        /* デイリー・コマンドセンター（ハーフモーダル） */
        .bottom-modal { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 80vh; background: var(--bg-color); border-top-left-radius: 16px; border-top-right-radius: 16px; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); z-index: 100; transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; }
        .bottom-modal.active { bottom: 0; }
        .modal-drag-bar { width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin: 8px auto; }
        .modal-header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; font-size: 18px; }
        .close-btn-round { background: #eee; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; font-weight: bold; color: #333; cursor: pointer; }
        
        .modal-body { padding: 10px 20px; overflow-y: auto; flex: 1; }
        .list-item { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; cursor: pointer; }
        .list-item:active { background: rgba(128,128,128,0.1); }
        .list-item-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .list-item-meta { font-size: 12px; color: #888; display: flex; gap: 10px; }
        
        .add-action-bar { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--header-bg); }
        .add-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; background: #0a84ff;}

        /* 暗幕 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(2px); transition: opacity 0.3s; opacity: 0; }
        #overlay.active { display: block; opacity: 1; }

        .loader { text-align: center; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div id="top-bar">
        <button class="icon-btn" onclick="scrollToToday()">◎</button>
        <div id="month-display">2026年 2月</div>
        <button id="auth-btn" onclick="handleAuthClick()">Google接続</button>
    </div>
    
    <div id="weekdays"></div>
    
    <div id="scroll-container">
        <div id="top-trigger" class="loader"></div>
        <div id="calendar-wrapper"></div>
        <div id="bottom-trigger" class="loader">データを読み込み中...</div>
    </div>

    <div id="overlay" onclick="closeDailyModal()"></div>

    <div id="daily-modal" class="bottom-modal">
        <div class="modal-drag-bar"></div>
        <div class="modal-header">
            <h2 id="daily-date-title">2月15日 (日)</h2>
            <button class="close-btn-round" onclick="closeDailyModal()">×</button>
        </div>
        <div class="modal-body" id="daily-list">
            </div>
        <div class="add-action-bar">
            <button class="add-btn" onclick="openEditModal('event')">＋ 新規予定</button>
            <button class="add-btn" style="background:#34c759;" onclick="openEditModal('task')">＋ タスク</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = '538529257653-1rac4r8uedqq75pqmlrhrhlfnhkhgkn4.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks';
        let tokenClient, gapiInited = false, gisInited = false;
        
        // データキャッシュエンジン
        const dataCache = {}; 
        let renderedMonths = []; // [ {year, month, elementId} ]
        
        let observer;
        let isFetching = false;
        let selectedDateStr = "";

        /* UI初期化 */
        function initWeekdays() {
            const wdContainer = document.getElementById('weekdays');
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            days.forEach((d, i) => {
                const div = document.createElement('div'); div.className = 'wd'; div.innerText = d;
                if(i===0) div.style.color = '#ff3b30'; if(i===6) div.style.color = '#0a84ff';
                wdContainer.appendChild(div);
            });
        }

        /* 無限スクロール・コアロジック */
        function setupObserver() {
            const options = { root: document.getElementById('scroll-container'), rootMargin: '200px', threshold: 0.1 };
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting && !isFetching && localStorage.getItem('jero_token')) {
                        if(entry.target.id === 'bottom-trigger') loadNextMonth();
                        if(entry.target.id === 'top-trigger') loadPrevMonth();
                    }
                });
            }, options);
            observer.observe(document.getElementById('bottom-trigger'));
            observer.observe(document.getElementById('top-trigger'));
        }

        async function initCalendar() {
            const today = new Date();
            const y = today.getFullYear(); const m = today.getMonth();
            await fetchAndRenderMonth(y, m, 'append', true);
            await fetchAndRenderMonth(y, m+1, 'append');
            scrollToToday();
        }

        async function loadNextMonth() {
            if(renderedMonths.length === 0) return;
            isFetching = true;
            const last = renderedMonths[renderedMonths.length - 1];
            let nextY = last.year; let nextM = last.month + 1;
            if(nextM > 11) { nextM = 0; nextY++; }
            await fetchAndRenderMonth(nextY, nextM, 'append');
            isFetching = false;
        }

        async function loadPrevMonth() {
            if(renderedMonths.length === 0) return;
            isFetching = true;
            const container = document.getElementById('scroll-container');
            const oldScrollHeight = container.scrollHeight;
            
            const first = renderedMonths[0];
            let prevY = first.year; let prevM = first.month - 1;
            if(prevM < 0) { prevM = 11; prevY--; }
            await fetchAndRenderMonth(prevY, prevM, 'prepend');
            
            // スクロール位置の補正（前月を上に足した分、画面が跳ねるのを防ぐ）
            container.scrollTop += (container.scrollHeight - oldScrollHeight);
            isFetching = false;
        }

        /* データ取得と描画 */
        async function fetchAndRenderMonth(year, month, position = 'append', isInitial = false) {
            const monthKey = `${year}-${month}`;
            const startOfMonth = new Date(year, month, 1).toISOString();
            const endOfMonth = new Date(year, month + 1, 0, 23, 59, 59).toISOString();

            if (!dataCache[monthKey]) {
                try {
                    const [eResp, tResp] = await Promise.all([
                        gapi.client.calendar.events.list({ calendarId: 'primary', timeMin: startOfMonth, timeMax: endOfMonth, singleEvents: true, orderBy: 'startTime', maxResults: 500 }),
                        gapi.client.tasks.tasks.list({ tasklist: '@default', dueMin: startOfMonth, dueMax: endOfMonth })
                    ]);
                    dataCache[monthKey] = { events: eResp.result.items || [], tasks: tResp.result.items || [] };
                } catch(e) { console.error(e); return; }
            }

            renderMonthDOM(year, month, dataCache[monthKey], position);
            
            if (position === 'append') renderedMonths.push({year, month});
            else renderedMonths.unshift({year, month});

            updateHeaderDisplay();
        }

        function renderMonthDOM(year, month, data, position) {
            const wrapper = document.createElement('div');
            wrapper.className = 'month-wrapper';
            wrapper.id = `month-${year}-${month}`;
            wrapper.innerHTML = `<div class="month-title" id="title-${year}-${month}">${year}年 ${month + 1}月</div><div class="calendar-grid"></div>`;
            const grid = wrapper.querySelector('.calendar-grid');

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div'); empty.className = 'day empty'; grid.appendChild(empty);
            }

            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                let className = 'day';
                
                const currentDayOfWeek = new Date(year, month, i).getDay();
                if (currentDayOfWeek === 0) dayEl.style.backgroundColor = 'var(--sun-bg)';
                if (currentDayOfWeek === 6) dayEl.style.backgroundColor = 'var(--sat-bg)';
                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) className += ' today';
                
                dayEl.className = className;
                dayEl.id = `cell-${dateStr}`;
                // マスタップでコマンドセンター展開
                dayEl.setAttribute('onclick', `openDailyModal('${dateStr}', ${currentDayOfWeek})`);
                
                dayEl.innerHTML = `<div class="day-num">${i}</div>`;

                // 予定とタスクの描画（表示は最大3件などに絞る工夫も今後可能）
                data.events.filter(e => (e.start.date || e.start.dateTime).includes(dateStr)).forEach(e => {
                    const div = document.createElement('div'); div.className = 'event'; 
                    // 終日か時間指定かで表示を変える
                    let timeStr = "";
                    if(e.start.dateTime) {
                        const d = new Date(e.start.dateTime);
                        timeStr = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} `;
                    }
                    div.innerText = timeStr + e.summary;
                    // GoogleのカラーIDが取れればここで色を変える事も可能
                    dayEl.appendChild(div);
                });
                data.tasks.filter(t => t.due && t.due.includes(dateStr)).forEach(t => {
                    const div = document.createElement('div'); div.className = 'task'; div.innerText = '√ ' + t.title; dayEl.appendChild(div);
                });
                grid.appendChild(dayEl);
            }

            const container = document.getElementById('calendar-wrapper');
            if (position === 'append') container.appendChild(wrapper);
            else container.insertBefore(wrapper, container.firstChild);
        }

        /* ダイナミックヘッダー */
        document.getElementById('scroll-container').addEventListener('scroll', updateHeaderDisplay);
        function updateHeaderDisplay() {
            const container = document.getElementById('scroll-container');
            const wrappers = document.querySelectorAll('.month-wrapper');
            let currentMonthTitle = "";
            wrappers.forEach(w => {
                const rect = w.getBoundingClientRect();
                // 画面の中央付近にある月を特定
                if(rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                    currentMonthTitle = w.querySelector('.month-title').innerText;
                }
            });
            if(currentMonthTitle) document.getElementById('month-display').innerText = currentMonthTitle;
        }

        function scrollToToday() {
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const target = document.getElementById(`cell-${dateStr}`);
            if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        /* デイリー・コマンドセンター（モーダル）制御 */
        function openDailyModal(dateStr, dayOfWeek) {
            selectedDateStr = dateStr;
            const days = ['日','月','火','水','木','金','土'];
            const [y, m, d] = dateStr.split('-');
            document.getElementById('daily-date-title').innerText = `${parseInt(m)}月${parseInt(d)}日 (${days[dayOfWeek]})`;
            
            const list = document.getElementById('daily-list');
            list.innerHTML = '';
            
            const monthKey = `${y}-${parseInt(m)-1}`;
            const data = dataCache[monthKey];
            let hasItems = false;

            if(data) {
                // 予定の展開
                data.events.filter(e => (e.start.date || e.start.dateTime).includes(dateStr)).forEach(e => {
                    hasItems = true;
                    let timeStr = "終日";
                    if(e.start.dateTime) {
                        const st = new Date(e.start.dateTime); const ed = new Date(e.end.dateTime);
                        timeStr = `${st.getHours()}:${String(st.getMinutes()).padStart(2,'0')} - ${ed.getHours()}:${String(ed.getMinutes()).padStart(2,'0')}`;
                    }
                    const item = document.createElement('div'); item.className = 'list-item';
                    item.innerHTML = `<div class="list-item-title"><span style="color:#0a84ff;">●</span> ${e.summary}</div>
                                      <div class="list-item-meta"><span>🕒 ${timeStr}</span> ${e.location ? `<span>📍 ${e.location}</span>` : ''}</div>`;
                    item.onclick = () => alert("v5.1でフル編集エディタを展開します"); // 次のフェーズの布石
                    list.appendChild(item);
                });
                // タスクの展開
                data.tasks.filter(t => t.due && t.due.includes(dateStr)).forEach(t => {
                    hasItems = true;
                    const item = document.createElement('div'); item.className = 'list-item';
                    item.innerHTML = `<div class="list-item-title"><span style="color:#34c759;">√</span> ${t.title}</div>
                                      <div class="list-item-meta">${t.notes ? `📝 ${t.notes}` : ''}</div>`;
                    list.appendChild(item);
                });
            }

            if(!hasItems) {
                list.innerHTML = `<div style="text-align:center; color:#888; padding: 20px;">予定はありません</div>`;
            }

            document.getElementById('overlay').classList.add('active');
            setTimeout(() => document.getElementById('daily-modal').classList.add('active'), 10);
        }

        function closeDailyModal() {
            document.getElementById('daily-modal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function openEditModal(type) {
            // ここでさらにGoogleフォームへのリンクではなく、画面内でのフルエディタを展開する
            alert(`【${selectedDateStr}】に新規${type === 'event' ? '予定' : 'タスク'}を追加するエディタがここに出現します。\nUIを重くしないため、これはv5.1で完全統合します。`);
        }

        /* 認証基盤 */
        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest", "https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest"]});
            gapiInited = true; initWeekdays(); setupObserver(); checkAutoLogin();
        }
        function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '', }); gisInited = true; }
        
        function checkAutoLogin() {
            const savedToken = localStorage.getItem('jero_token'); const savedTime = localStorage.getItem('jero_token_time');
            if (savedToken && savedTime && (Date.now() - savedTime < 3500000)) {
                document.getElementById('auth-btn').innerText = '同期中...';
                gapi.client.setToken({access_token: savedToken});
                document.getElementById('auth-btn').style.display = 'none';
                initCalendar();
            }
        }

        async function handleAuthClick() {
            if (!gisInited || !gapiInited) return;
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                gapi.client.setToken({access_token: resp.access_token});
                localStorage.setItem('jero_token', resp.access_token); localStorage.setItem('jero_token_time', Date.now());
                document.getElementById('auth-btn').style.display = 'none';
                initCalendar();
            };
            tokenClient.requestAccessToken({prompt: 'consent'});
        }
    </script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
